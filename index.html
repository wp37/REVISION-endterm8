    /* ============================
       HOA PHƯỢNG - Falling Petals
       ============================ */
    .phuong-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }

    .petal {
      position: absolute;
      top: -40px;
      opacity: 0;
      animation: petal-fall linear infinite;
    }

    /* Petal SVG shapes - different variations */
    .petal-1 {
      width: 18px;
      height: 22px;
    }

    .petal-2 {
      width: 14px;
      height: 18px;
    }

    .petal-3 {
      width: 20px;
      height: 16px;
    }

    @keyframes petal-fall {
      0% {
        opacity: 0;
        transform: translateX(0) rotate(0deg) scale(0.8);
      }

      5% {
        opacity: 0.7;
      }

      25% {
        transform: translateX(30px) rotate(90deg) scale(1);
      }

      50% {
        opacity: 0.5;
        transform: translateX(-20px) rotate(180deg) scale(0.9);
      }

      75% {
        transform: translateX(40px) rotate(270deg) scale(0.85);
      }

      95% {
        opacity: 0.3;
      }

      100% {
        opacity: 0;
        transform: translateX(15px) rotate(360deg) scale(0.7);
        top: 100vh;
      }
    }

    /* Branch decoration in corner */
    .phuong-branch {
      position: fixed;
      top: 0;
      right: 0;
      width: 280px;
      height: 280px;
      pointer-events: none;
      z-index: 1;
      opacity: 0.15;

      left: 0;
      width: 220px;
      height: 220px;

    @keyframes sway {

      }

      50% {

      }
    }

    .sway {
      animation: sway 4s ease-in-out infinite;

  <!-- Falling Petals Script -->
  <script>
    (function () {
      const container = document.getElementById('petalContainer');
      const PETAL_COUNT = 15;
      const colors = ['#e63946', '#ff4d5a', '#ff6b6b', '#ff8585', '#d63031', '#eb4d4b'];

      function createPetalSVG(color, type) {
        const svgs = [
          // Petal type 1 - classic flame tree petal
          `<svg viewBox="0 0 20 26" xmlns="http://www.w3.org/2000/svg"><path d="M10 0 C14 6, 20 14, 16 22 Q13 26, 10 24 Q7 26, 4 22 C0 14, 6 6, 10 0Z" fill="${color}" opacity="0.7"/></svg>`,
          // Petal type 2 - rounder
          `<svg viewBox="0 0 16 20" xmlns="http://www.w3.org/2000/svg"><ellipse cx="8" cy="10" rx="7" ry="9" fill="${color}" opacity="0.65"/></svg>`,
          // Petal type 3 - narrow
          `<svg viewBox="0 0 12 22" xmlns="http://www.w3.org/2000/svg"><path d="M6 0 C10 5, 12 12, 9 20 Q6 22, 3 20 C0 12, 2 5, 6 0Z" fill="${color}" opacity="0.6"/></svg>`,
        ];
        return svgs[type % 3];
      }

      function spawnPetal() {
        const petal = document.createElement('div');
        petal.className = 'petal';
        const color = colors[Math.floor(Math.random() * colors.length)];
        const type = Math.floor(Math.random() * 3);
        const size = 12 + Math.random() * 14;

        petal.innerHTML = createPetalSVG(color, type);
        petal.style.left = Math.random() * 100 + 'vw';
        petal.style.width = size + 'px';
        petal.style.height = (size * 1.3) + 'px';
        petal.style.animationDuration = (8 + Math.random() * 12) + 's';
        petal.style.animationDelay = (Math.random() * 15) + 's';

        container.appendChild(petal);

        // Remove and recreate after animation
        setTimeout(() => {
          if (petal.parentNode) {
            petal.parentNode.removeChild(petal);
            spawnPetal();
          }
        }, (8 + 12 + 15) * 1000);
      }

      // Create initial petals with staggered start
      for (let i = 0; i < PETAL_COUNT; i++) {
        setTimeout(spawnPetal, i * 800);
      }
    })();
  </script>
