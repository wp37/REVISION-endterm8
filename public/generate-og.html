<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>OG Image Generator</title>
    <style>
        body {
            margin: 0;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        canvas {
            border: 1px solid #333;
        }

        #download {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 12px 24px;
            background: #10b981;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            z-index: 10;
        }
    </style>
</head>

<body>
    <button id="download">Download PNG</button>
    <canvas id="canvas" width="1200" height="630"></canvas>
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        // Background gradient (green -> teal -> purple -> dark blue)
        const grad = ctx.createLinearGradient(0, 0, 1200, 630);
        grad.addColorStop(0, '#065f46');
        grad.addColorStop(0.3, '#0891b2');
        grad.addColorStop(0.65, '#6d28d9');
        grad.addColorStop(1, '#1e3a5f');
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, 1200, 630);

        // Decorative circles (bokeh effect)
        function drawBokeh(x, y, r, color, alpha) {
            ctx.beginPath();
            ctx.arc(x, y, r, 0, Math.PI * 2);
            ctx.fillStyle = color;
            ctx.globalAlpha = alpha;
            ctx.fill();
            ctx.globalAlpha = 1;
        }
        drawBokeh(150, 100, 80, '#10b981', 0.08);
        drawBokeh(400, 500, 120, '#6d28d9', 0.06);
        drawBokeh(900, 150, 100, '#3b82f6', 0.07);
        drawBokeh(1050, 450, 70, '#10b981', 0.05);

        // Draw flame tree branch
        ctx.strokeStyle = '#5d3a1a';
        ctx.lineWidth = 4;
        ctx.globalAlpha = 0.7;
        ctx.beginPath();
        ctx.moveTo(0, 200);
        ctx.quadraticCurveTo(100, 180, 200, 220);
        ctx.quadraticCurveTo(300, 260, 400, 280);
        ctx.quadraticCurveTo(450, 290, 480, 310);
        ctx.stroke();

        // Sub-branches
        ctx.lineWidth = 2.5;
        ctx.beginPath();
        ctx.moveTo(150, 195);
        ctx.quadraticCurveTo(170, 160, 200, 150);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(280, 245);
        ctx.quadraticCurveTo(300, 210, 330, 200);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(370, 270);
        ctx.quadraticCurveTo(390, 240, 420, 235);
        ctx.stroke();
        ctx.globalAlpha = 1;

        // Leaves
        function drawLeaf(x, y, rx, ry, angle, color, alpha) {
            ctx.save();
            ctx.translate(x, y);
            ctx.rotate(angle * Math.PI / 180);
            ctx.beginPath();
            ctx.ellipse(0, 0, rx, ry, 0, 0, Math.PI * 2);
            ctx.fillStyle = color;
            ctx.globalAlpha = alpha;
            ctx.fill();
            ctx.restore();
            ctx.globalAlpha = 1;
        }
        drawLeaf(180, 145, 18, 6, -30, '#2d8540', 0.5);
        drawLeaf(195, 155, 16, 5, -20, '#3a9e50', 0.45);
        drawLeaf(310, 195, 15, 5.5, -15, '#2d8540', 0.5);
        drawLeaf(325, 205, 14, 5, -10, '#3a9e50', 0.45);
        drawLeaf(410, 230, 14, 5, -5, '#2d8540', 0.45);
        drawLeaf(425, 240, 13, 4.5, 5, '#3a9e50', 0.4);
        drawLeaf(460, 295, 12, 4, 10, '#2d8540', 0.4);

        // Flowers (clusters of red circles)
        function drawFlower(x, y, r, color, alpha) {
            ctx.beginPath();
            ctx.arc(x, y, r, 0, Math.PI * 2);
            ctx.fillStyle = color;
            ctx.globalAlpha = alpha;
            ctx.fill();
            ctx.globalAlpha = 1;
        }
        // Cluster 1 (top)
        const reds = ['#e63946', '#ff4d5a', '#ff6b6b', '#d63031', '#eb4d4b'];
        [[120, 170, 9], [130, 160, 8], [140, 175, 7], [115, 155, 7], [145, 165, 6]].forEach(([x, y, r], i) =>
            drawFlower(x, y, r, reds[i % 5], 0.75));
        // Cluster 2
        [[210, 140, 8], [220, 130, 7], [230, 145, 6.5], [205, 128, 6], [225, 152, 7]].forEach(([x, y, r], i) =>
            drawFlower(x, y, r, reds[(i + 1) % 5], 0.7));
        // Cluster 3
        [[340, 190, 8], [350, 180, 7], [360, 195, 7], [335, 178, 6], [355, 200, 6.5]].forEach(([x, y, r], i) =>
            drawFlower(x, y, r, reds[(i + 2) % 5], 0.7));
        // Cluster 4
        [[430, 225, 7], [440, 218, 6.5], [448, 230, 6], [425, 215, 6], [445, 238, 5.5]].forEach(([x, y, r], i) =>
            drawFlower(x, y, r, reds[(i + 3) % 5], 0.65));

        // Falling petals
        function drawPetal(x, y, w, h, angle, color, alpha) {
            ctx.save();
            ctx.translate(x, y);
            ctx.rotate(angle * Math.PI / 180);
            ctx.beginPath();
            ctx.moveTo(0, -h / 2);
            ctx.quadraticCurveTo(w / 2, -h / 4, w / 3, h / 3);
            ctx.quadraticCurveTo(0, h / 2, -w / 3, h / 3);
            ctx.quadraticCurveTo(-w / 2, -h / 4, 0, -h / 2);
            ctx.fillStyle = color;
            ctx.globalAlpha = alpha;
            ctx.fill();
            ctx.restore();
            ctx.globalAlpha = 1;
        }
        drawPetal(500, 350, 14, 18, 45, '#e63946', 0.5);
        drawPetal(380, 420, 12, 16, 120, '#ff4d5a', 0.4);
        drawPetal(280, 480, 13, 17, 200, '#ff6b6b', 0.35);
        drawPetal(520, 480, 11, 15, 80, '#e63946', 0.3);
        drawPetal(180, 380, 10, 14, 160, '#ff4d5a', 0.35);
        drawPetal(450, 150, 12, 16, 30, '#d63031', 0.4);

        // Horizontal decorative line
        ctx.strokeStyle = 'rgba(255,255,255,0.15)';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(580, 315);
        ctx.lineTo(1140, 315);
        ctx.stroke();

        // Main text - "Ôn tập"
        ctx.fillStyle = '#ffffff';
        ctx.font = 'bold 90px Inter, system-ui, sans-serif';
        ctx.textAlign = 'left';
        ctx.shadowColor = 'rgba(0,0,0,0.3)';
        ctx.shadowBlur = 10;
        ctx.shadowOffsetX = 2;
        ctx.shadowOffsetY = 2;
        ctx.fillText('Ôn tập', 600, 230);

        // "Cuối kỳ 2"
        ctx.font = 'bold 90px Inter, system-ui, sans-serif';
        ctx.fillText('Cuối kỳ 2', 600, 330);

        // "Tiếng Anh 8"
        ctx.font = '500 60px Inter, system-ui, sans-serif';
        ctx.fillStyle = '#d1fae5';
        ctx.fillText('Tiếng Anh 8', 620, 410);

        // Emoji flower
        ctx.font = '50px serif';
        ctx.fillText('🌺', 535, 240);

        // Bottom info line
        ctx.shadowBlur = 0;
        ctx.shadowOffsetX = 0;
        ctx.shadowOffsetY = 0;
        ctx.font = '300 22px Inter, system-ui, sans-serif';
        ctx.fillStyle = 'rgba(255,255,255,0.7)';
        ctx.fillText('Global Success  |  Thầy Võ Ngọc Tùng  |  THCS Nguyễn Văn Bánh', 600, 530);

        // Year badge
        ctx.font = '500 20px Inter, system-ui, sans-serif';
        ctx.fillStyle = 'rgba(255,255,255,0.5)';
        ctx.fillText('2025 – 2026', 600, 570);

        // Download button
        document.getElementById('download').onclick = () => {
            const link = document.createElement('a');
            link.download = 'og-thumbnail.png';
            link.href = canvas.toDataURL('image/png');
            link.click();
        };
    </script>
</body>

</html>
